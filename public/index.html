<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Coolify – What is Where</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
  <h1>Coolify – What is Where</h1>
  <p>Dienste je Host sammeln – mit Adresse, Port, Name und Bild.</p>
</header>

<main>
  <section class="panel">
    <h2>Neuer Host</h2>
    <form id="host-form" class="row">
      <input name="name" placeholder="Host-Name, z.B. Coolify-Server" required />
      <button type="submit">Host anlegen</button>
    </form>
  </section>

  <section class="panel">
    <h2>Neuer Dienst</h2>
    <form id="service-form" enctype="multipart/form-data">
      <label>Host
        <select name="hostId" id="host-select" required></select>
      </label>
      <label>Name
        <input name="name" required placeholder="z.B. Gitea" />
      </label>
      <label>Adresse (Host/IP, ohne Port)
        <input name="address" required placeholder="z.B. server.local" />
      </label>
      <label>Port
        <div class="port-row">
          <input name="port" id="port-input" type="number" min="1" max="65535" required />
          <button type="button" id="free-port-btn">Freien Port holen</button>
        </div>
        <small id="port-hint"></small>
      </label>
      <label>Bild / Icon
        <input name="image" type="file" accept="image/*" />
      </label>
      <button type="submit">Speichern</button>
      <p id="form-error" class="error"></p>
    </form>
  </section>

  <section id="hosts-container"></section>
</main>

<!-- Edit-Modal -->
<dialog id="edit-modal">
  <form id="edit-form" enctype="multipart/form-data" method="dialog">
    <h3 id="edit-title">Bearbeiten</h3>
    <input type="hidden" name="id" />
    <input type="hidden" name="kind" />
    <label>Name <input name="name" required /></label>
    <div class="svc-only">
      <label>Host <select name="hostId"></select></label>
      <label>Adresse <input name="address" /></label>
      <label>Port
        <div class="port-row">
          <input name="port" type="number" min="1" max="65535" />
          <button type="button" id="edit-free-port">Frei</button>
        </div>
      </label>
      <label>Neues Bild <input name="image" type="file" accept="image/*" /></label>
    </div>
    <p class="error" id="edit-error"></p>
    <div class="row">
      <button value="save" id="edit-save">Speichern</button>
      <button value="cancel" type="button" id="edit-cancel">Abbrechen</button>
    </div>
  </form>
</dialog>

<script src="/app.js"></script>
</body>
</html>
